<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standoff 2 - Главное меню</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e; /* Тёмный фон */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Временный фон, позже можно заменить на картинку или 3D-сцену */
            background-image: radial-gradient(circle, #2a2a4e 0%, #000000 100%);
        }

        .screen {
            display: none; /* Скрываем все экраны по умолчанию */
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.8);
            width: 400px;
            backdrop-filter: blur(5px);
        }

        .active {
            display: block; /* Показываем только активный экран */
        }

        h1 {
            color: #ff9f1c; /* Оранжевый акцент */
            margin-bottom: 30px;
            font-size: 34px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px #000;
        }

        h2 {
            color: #ffffff;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #2b2d42;
            color: white;
            border: 2px solid #2b2d42;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
            font-weight: bold;
        }

        .menu-btn:hover {
            background-color: #ff9f1c;
            border-color: #ff9f1c;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(255, 159, 28, 0.3);
        }

        .menu-btn:active {
            transform: scale(0.98);
        }

        .back-btn {
            background-color: #555;
            border-color: #555;
            margin-top: 30px;
        }

        .back-btn:hover {
            background-color: #777;
            border-color: #777;
        }
        
        .content-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            min-height: 100px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <!-- Экран: Главное меню -->
    <div id="main-menu" class="screen active">
        <h1>Standoff 2</h1>
        <button class="menu-btn" onclick="showScreen('mode-selection')">Играть</button>
        <button class="menu-btn" onclick="showScreen('inventory-screen')">Инвентарь</button>
        <button class="menu-btn" onclick="showScreen('shop-screen')">Магазин</button>
    </div>

    <!-- Экран: Выбор режима -->
    <div id="mode-selection" class="screen">
        <h2>Выберите режим</h2>
        <button class="menu-btn" onclick="alert('Подключение к серверу: Командный бой 5х5...')">Бой 5 на 5</button>
        <button class="menu-btn" onclick="alert('Подключение к серверу: Дуэль 2х2...')">Дуэль 2 на 2</button>
        <button class="menu-btn back-btn" onclick="showScreen('main-menu')">Назад</button>
    </div>

    <!-- Экран: Инвентарь -->
    <div id="inventory-screen" class="screen">
        <h2>Инвентарь</h2>
        <div class="content-box">
            <p>Здесь будут отображаться твои скины, ножи и оружие.</p>
        </div>
        <button class="menu-btn back-btn" onclick="showScreen('main-menu')">Назад</button>
    </div>

    <!-- Экран: Магазин -->
    <div id="shop-screen" class="screen">
        <h2>Магазин</h2>
        <div class="content-box">
            <p>Здесь можно будет открывать кейсы и покупать валюту.</p>
        </div>
        <button class="menu-btn back-btn" onclick="showScreen('main-menu')">Назад</button>
    </div>

    <script>
        // Функция для переключения экранов
        function showScreen(screenId) {
            // Находим все элементы с классом 'screen'
            const screens = document.querySelectorAll('.screen');
            
            // Убираем у всех класс 'active' (скрываем их)
            screens.forEach(screen => {
                screen.classList.remove('active');
            });

            // Добавляем класс 'active' только нужному экрану (показываем его)
            document.getElementById(screenId).classList.add('active');
        }
    </script>
</body>
</html>
